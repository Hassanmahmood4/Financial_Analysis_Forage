  <rect class="box" x="770" y="112" width="138" height="48" rx="8"/>
  <text class="title" x="839" y="134" text-anchor="middle">Predefined</text>
  <text class="label" x="839" y="150" text-anchor="middle">Financial Q&amp;A</text>

  <path class="arrow" d="M128 44 H158"/>
  <path class="arrow" d="M276 44 H306"/>
  <path class="arrow" d="M444 44 H474"/>
  <path class="arrow" d="M592 44 H622"/>
  <path class="arrow" d="M375 68 V88 H543 V112"/>
  <path class="arrow" d="M681 68 V96 H543 H612"/>
  <path class="arrow" d="M612 136 H770"/>
